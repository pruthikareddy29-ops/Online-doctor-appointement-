<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctor Appointment</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(120deg,#a1c4fd,#c2e9fb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:420px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

.output{
margin-top:20px;
padding:15px;
background:#f5f5f5;
border-radius:6px;
}
</style>

</head>

<body>

<div class="container">

<h2>Doctor Appointment</h2>

<form id="appointmentForm">

<label>Department</label>
<select id="department">
<option>General</option>
<option>Cardiology</option>
<option>Orthopedic</option>
<option>Dermatology</option>
<option>Pediatrics</option>
</select>

<label>Doctor Category</label>
<select id="category">
<option>Senior Doctor</option>
<option>Consultant</option>
<option>Specialist</option>
</select>

<label>Patient Name</label>
<input type="text" id="name" required>

<label>Phone Number</label>
<input type="tel" id="phone" required>

<label>Payment Method</label>
<select id="payment">
<option>Cash</option>
<option>UPI</option>
<option>Card</option>
<option>Online</option>
</select>

<button type="submit">Submit Appointment</button>

</form>

<div class="output" id="result" style="display:none"></div>

<button onclick="printPage()">Print</button>
<button onclick="download()">Download</button>

</div>

<script>

let appointmentID = "APT" + Math.floor(Math.random()*100000);

document.getElementById("appointmentForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let dept=document.getElementById("department").value;
let category=document.getElementById("category").value;
let payment=document.getElementById("payment").value;

let result = `
<h3>Appointment Confirmed</h3>
<p><b>Appointment ID:</b> ${appointmentID}</p>
<p><b>Patient Name:</b> ${name}</p>
<p><b>Phone:</b> ${phone}</p>
<p><b>Department:</b> ${dept}</p>
<p><b>Doctor Category:</b> ${category}</p>
<p><b>Payment:</b> ${payment}</p>
`;

document.getElementById("result").innerHTML=result;
document.getElementById("result").style.display="block";

});

function printPage(){
window.print();
}

function download(){

let text=document.getElementById("result").innerText;

let blob=new Blob([text],{type:"text/plain"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="appointment.txt";

link.click();
}

</script>

</body>
</html>
